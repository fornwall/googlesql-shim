# Builds the static GoogleSQL shim archives for every supported platform and
# attaches one tarball per platform, plus SHA256SUMS, to a GitHub release.
# Triggered by pushing a `v*` tag; workflow_dispatch builds and uploads
# workflow artifacts instead (no release), for testing.
#
# The build is self-contained: GoogleSQL is fetched by Bazel via the
# archive_override pin in MODULE.bazel; nothing is checked out from
# fornwall/smallquery.
#
# A release ships whichever legs are green: the release job runs even if a
# matrix leg failed (its tarball is simply absent and SHA256SUMS covers what
# shipped). Windows is probed in .github/workflows/windows-probe.yml, not
# here -- see the README's platform table.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  # The fornwall/googlesql commit MODULE.bazel pins (asserted below, so the
  # release notes cannot drift from the actual build input).
  GOOGLESQL_COMMIT: 3de0fa70c44ae9a363269875ada515ab5e2ae57a
  # One LLVM major for the gnu and darwin legs: apt.llvm.org's latest
  # stable branch for noble, which Homebrew also serves as llvm@21.
  LLVM_MAJOR: "21"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-linux-gnu
            os: ubuntu-24.04
            kind: linux-gnu
          - triple: aarch64-linux-gnu
            os: ubuntu-24.04-arm
            kind: linux-gnu
          - triple: x86_64-linux-musl
            os: ubuntu-24.04
            kind: linux-musl
          - triple: aarch64-linux-musl
            os: ubuntu-24.04-arm
            kind: linux-musl
          - triple: aarch64-apple-darwin
            os: macos-15
            kind: darwin
          # Native build on the Intel runner. A --cpu=darwin_x86_64
          # cross-compile from the arm64 runner was tried first and silently
          # produced arm64 objects (the generic Unix toolchain ignores the
          # legacy flag; the verify step's lipo check caught it) -- proper
          # cross would mean adopting apple_support's toolchain, which
          # conflicts with pinning Homebrew LLVM.
          - triple: x86_64-apple-darwin
            os: macos-15-intel
            kind: darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost /usr/local/share/powershell \
            /usr/share/swift "$AGENT_TOOLSDIRECTORY"
          df -h /

      - uses: actions/checkout@v7

      - name: Verify the pinned GoogleSQL commit matches MODULE.bazel
        run: grep -q "$GOOGLESQL_COMMIT" MODULE.bazel

      # --force_pic is load-bearing on Linux, not an optimisation: under plain
      # `-c opt`, cc_static_library packs BOTH the PIC and non-PIC variants of
      # every object into the archive (shim.o AND shim.pic.o), and the
      # consumer's +whole-archive link then fails with mass duplicate-symbol
      # errors (measured; fastbuild only ever produced PIC members, which is
      # why the dev build never hit this). With --force_pic only .pic.o
      # members exist; the verify step below pins that. On macOS everything
      # is PIC anyway and objects carry no .pic.o suffix; the flag is
      # accepted and harmless there.
      # Clang comes from apt.llvm.org (its latest stable branch for noble,
      # currently 21; arm64 debs are served too), pinned by major rather
      # than taken from the runner image so releases stay reproducible as
      # the image's default clang drifts.
      - name: Build (linux-gnu)
        if: matrix.kind == 'linux-gnu'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_MAJOR"
          "clang-$LLVM_MAJOR" --version
          bazel --version
          # //shim:static and //shim:smoke_test in one invocation so the gate
          # runs in the exact configuration the artifacts are built in -- a
          # build that computes wrong analyzer answers (the -c opt NDEBUG/QCHECK_OK
          # bug) fails the leg here rather than shipping.
          bazel test -c opt --force_pic \
            --repo_env=CC="/usr/bin/clang-$LLVM_MAJOR" \
            --repo_env=CXX="/usr/bin/clang++-$LLVM_MAJOR" \
            --test_output=errors \
            //shim:static //shim:smoke_test //shim:protos
          mkdir dist
          cp -L bazel-bin/shim/libgooglesql_shim.a \
                bazel-bin/shim/libgooglesql_shim_alwayslink.a \
                bazel-bin/shim/libicu*.a dist/
          cp -rL bazel-bin/shim/protos dist/protos
          # Bazel outputs are read-only; ship writable trees so a consumer's
          # extracted cache can be removed with a plain rm -rf.
          chmod -R u+w dist
          {
            echo "triple: ${{ matrix.triple }}"
            echo "bazel: $(bazel --version)"
            echo "cc: $("clang-$LLVM_MAJOR" --version | head -1)"
            echo "libc: $(ldd --version | head -1)"
            echo "os: $(lsb_release -ds) (GitHub ${{ matrix.os }} runner)"
          } > dist/toolchain.txt
          df -h /

      # musl cannot run upstream Bazel (glibc-only binaries); the build runs
      # natively inside an Alpine container instead -- see the script for the
      # full story (Alpine's musl-native bazel8 package, plus gcompat for the
      # one glibc-linked piece: rules_python's hermetic CPython, which only
      # runs GoogleSQL's code generators and contributes nothing to the
      # archives). The container follows the runner's architecture, so the
      # same script serves x86_64 and aarch64.
      # x86_64 builds on stable Alpine; aarch64 needs a digest-pinned edge
      # image because no rules_python version ships an aarch64-musl CPython,
      # so the glibc interpreter must run under gcompat + edge's musl (see
      # scripts/build-musl.sh for the full story).
      - name: Build (linux-musl, in an Alpine container)
        if: matrix.kind == 'linux-musl'
        run: |
          case "${{ matrix.triple }}" in
            aarch64-*) img="alpine:edge@sha256:9a341ff2287c54b86425cbee0141114d811ae69d88a36019087be6d896cef241" ;;
            *)         img="alpine:3.23" ;;
          esac
          mkdir dist
          docker run --rm -v "$PWD":/src:ro -v "$PWD/dist":/out "$img" \
            sh /src/scripts/build-musl.sh
          sudo chown -R "$(id -u):$(id -g)" dist
          df -h /

      # Homebrew's llvm@N -- the same major as the linux-gnu apt.llvm.org
      # pin -- rather than the image's Xcode clang, again so releases stay
      # reproducible across runner-image updates. Overriding CC moves Bazel
      # to its generic Unix toolchain, whose autoconfig and compile actions
      # both need the Apple SDK: SDKROOT is exported into the repo rule and
      # the actions.
      - name: Build (darwin)
        if: matrix.kind == 'darwin'
        run: |
          command -v bazel >/dev/null || brew install bazelisk
          command -v zstd >/dev/null || brew install zstd
          brew install "llvm@$LLVM_MAJOR"
          LLVM_PREFIX="$(brew --prefix "llvm@$LLVM_MAJOR")"
          "$LLVM_PREFIX/bin/clang" --version
          SDKROOT="$(xcrun --show-sdk-path)"
          export SDKROOT
          bazel --version
          # Gate runs in the artifacts' exact configuration; see the
          # linux-gnu step.
          bazel test -c opt --force_pic \
            --repo_env=CC="$LLVM_PREFIX/bin/clang" \
            --repo_env=CXX="$LLVM_PREFIX/bin/clang++" \
            --repo_env=SDKROOT="$SDKROOT" \
            --action_env=SDKROOT="$SDKROOT" \
            --test_output=errors \
            //shim:static //shim:smoke_test //shim:protos
          mkdir dist
          cp -L bazel-bin/shim/libgooglesql_shim.a \
                bazel-bin/shim/libgooglesql_shim_alwayslink.a \
                bazel-bin/shim/libicu*.a dist/
          cp -rL bazel-bin/shim/protos dist/protos
          # Bazel outputs are read-only; ship writable trees so a consumer's
          # extracted cache can be removed with a plain rm -rf.
          chmod -R u+w dist
          {
            echo "triple: ${{ matrix.triple }}"
            echo "bazel: $(bazel --version)"
            echo "cc: $("$LLVM_PREFIX/bin/clang" --version | head -1)"
            echo "os: $(sw_vers -productName) $(sw_vers -productVersion) (GitHub ${{ matrix.os }} runner), SDK $(xcrun --show-sdk-version)"
          } > dist/toolchain.txt

      - name: Verify artifacts
        run: |
          cd dist
          ls -la
          test -f libgooglesql_shim.a
          test -f libgooglesql_shim_alwayslink.a
          ls libicu*.a
          # The proto closure smallquery's build.rs feeds prost: the entry
          # point plus the three protos upstream generates from .template
          # files (which exist in no source tree, hence shipping them here).
          test -f protos/googlesql/local_service/local_service.proto
          test -f protos/googlesql/parser/parse_tree.proto
          test -f protos/googlesql/resolved_ast/resolved_ast.proto
          test -f protos/googlesql/resolved_ast/resolved_node_kind.proto
          # The alwayslink hazard guard: the side archive must carry the
          # ROW-type static-initializer object that smallquery force-loads
          # with +whole-archive (`row_type_with_catalog.pic.o` on Linux,
          # no .pic infix on macOS).
          ar t libgooglesql_shim_alwayslink.a
          ar t libgooglesql_shim_alwayslink.a | grep -q 'row_type_with_catalog'
          ar t libgooglesql_shim.a | grep -q 'row_type_with_catalog'
          if [ "$RUNNER_OS" = "Linux" ]; then
            # --force_pic worked: no non-PIC members, or the consumer's
            # +whole-archive link explodes with duplicate symbols.
            nonpic=$(ar t libgooglesql_shim.a | grep -vc '\.pic\.o$' || true)
            echo "non-PIC members in bundle: $nonpic"
            test "$nonpic" -eq 0
          else
            # The archive really contains the architecture the triple
            # promises -- the x86_64 leg is a cross-build from arm64.
            case "${{ matrix.triple }}" in
              aarch64-*) want=arm64 ;;
              x86_64-*)  want=x86_64 ;;
            esac
            lipo -info libgooglesql_shim.a
            lipo -info libgooglesql_shim.a | grep -qw "$want"
          fi

      - name: Package
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            version="$GITHUB_REF_NAME"
          else
            version="dev-$(echo "$GITHUB_SHA" | cut -c1-7)"
          fi
          name="googlesql-shim-$version-${{ matrix.triple }}"
          {
            echo "package: $name"
            echo "source: fornwall/googlesql-shim@$GITHUB_SHA"
            echo "googlesql: fornwall/googlesql@$GOOGLESQL_COMMIT"
            echo "build: bazel build -c opt --force_pic //shim:static"
            cat dist/toolchain.txt
          } > dist/BUILDINFO.txt
          rm dist/toolchain.txt
          cat dist/BUILDINFO.txt
          # -19: measured on a 244 MB archive, 29.2 -> 20.3 MB vs -3 with
          # identical decompression time (zstd decode speed is level-
          # independent); the ~19 s/artifact encode cost is paid once here.
          tar -cf - -C dist . | zstd -19 -T0 -o "$name.tar.zst"
          ls -la "$name.tar.zst"
          # One leg also publishes the protos alone (same `protos/` layout as
          # the platform tarballs, plus BUILDINFO.txt), for consumers that
          # need the generated types but not the archives -- smallquery's
          # GOOGLESQL_SYS_SKIP_NATIVE builds. The closure is
          # platform-independent, so any single leg serves; this one is the
          # cheapest runner.
          if [ "${{ matrix.triple }}" = x86_64-linux-gnu ]; then
            mkdir proto-dist
            cp -r dist/protos proto-dist/protos
            cp dist/BUILDINFO.txt proto-dist/
            tar -cf - -C proto-dist . | zstd -19 -T0 \
              -o "googlesql-shim-$version-protos.tar.zst"
            ls -la "googlesql-shim-$version-protos.tar.zst"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: googlesql-shim-${{ matrix.triple }}
          path: "*.tar.zst"
          compression-level: 0

  release:
    needs: build
    # Runs even when a matrix leg failed: a release ships whichever legs are
    # green, and the README's platform table documents the rest.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download platform tarballs
        uses: actions/download-artifact@v8
        with:
          path: assets
          pattern: googlesql-shim-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd assets
          sha256sum -- *.tar.zst > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Prebuilt static GoogleSQL shim archives for [smallquery](https://github.com/fornwall/smallquery)."
            echo
            echo "Built from:"
            echo "- fornwall/googlesql-shim@${GITHUB_SHA} (shim sources + build config)"
            echo "- fornwall/googlesql@${GOOGLESQL_COMMIT} (via MODULE.bazel archive_override)"
            echo
            echo "Build: \`bazel build -c opt --force_pic //shim:static\` per platform; each tarball's \`BUILDINFO.txt\` records the exact toolchain (bazel, compiler, libc, OS image)."
            echo
            echo "One \`.tar.zst\` per platform (extract with \`tar --zstd -xf\`), containing at its root: \`libgooglesql_shim.a\`, \`libgooglesql_shim_alwayslink.a\`, the ICU archives (\`libicudata.a\`, \`libicuuc.a\`, \`libicui18n.a\`, \`libicuio.a\`), \`protos/\` (the transitive \`.proto\` closure of \`local_service.proto\`, including the three protos upstream generates from \`.template\` files) and \`BUILDINFO.txt\`. The \`-protos\` tarball carries \`protos/\` alone, for consumers that need the generated types but not the archives. \`SHA256SUMS\` covers all tarballs (\`sha256sum -c\`). See the README for the platform table, how the archives map onto smallquery's static link, and the libc compatibility caveats."
          } > notes.md
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            assets/*.tar.zst assets/SHA256SUMS

      - name: Upload checksums as workflow artifact (non-tag runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: assets/SHA256SUMS
