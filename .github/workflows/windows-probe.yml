# A deliberately separate, manual probe of Windows support -- NOT part of the
# release pipeline. Upstream GoogleSQL (ZetaSQL lineage) has never supported
# MSVC/Windows, so this iterates on the blockers one at a time; see the
# platform table in the README for the current status. If a full build here
# ever goes green, promote the leg into release.yml.
#
# Findings (dispatch runs, newest last):
# - x86_64, build-system blockers -- ALL CLEARED:
#   * ICU's autotools build under rules_foreign_cc was the original wall;
#     it is gone entirely, replaced by the native Bazel ICU build
#     (third_party/icu). @icu//:icuuc and @icu//:icudata now compile clean
#     under MSVC (icuuc needed /utf-8 for its char16_t literals).
#   * MAX_PATH overflow (cl.exe D8022 on a .obj.params file) -- fixed with
#     --output_base=C:/_b.
# - x86_64, current wall -- GoogleSQL SOURCE, not the build system: with
#   everything above cleared the build gets through all of Abseil/protobuf
#   and ~1800/2700 targets into GoogleSQL, then hits GoogleSQL's own POSIX
#   source dependencies. These are patched (OS-guarded) on fornwall/googlesql
#   and applied via MODULE.bazel: base/logging.cc (<libgen.h>/<unistd.h>,
#   pull-3) and common/thread_stack.cc (pthread/unistd, pull-7) clear the
#   pthread/unistd tail. The next known blocker is the networking code
#   (googlesql/base/net/ipaddress_oss.* and googlesql/public/functions/net.cc),
#   which needs a winsock port -- <arpa/inet.h>/<netinet/in.h> and, hardest,
#   the in6_addr.s6_addr32/s6_addr16 member accesses that Windows' in6_addr
#   does not provide. Tracked as follow-up upstream PRs.
# - This workflow now relies on the checked-in .bazelrc (build:windows section)
#   rather than --ignore_all_rc_files: the Clang/GNU flags moved to build:unix
#   so MSVC no longer sees them, and build:windows carries the /std:c++20,
#   /utf-8, /bigobj, /Zc:* and /D* equivalents. Only --output_base (a startup
#   flag, which no bazelrc config can carry) stays on the command line.
# - aarch64: fails even earlier and for an unrelated reason -- GoogleSQL's
#   pip module extension (rules_python) has no hermetic interpreter for
#   windows-arm64, so analysis aborts before any C++; past that it shares
#   x86_64's source-level wall.
#
# The `target` input keeps iterations cheap: probe one library (e.g.
# @icu//:icuuc) rather than the whole shim, then graduate to //shim:static.

name: windows-probe

on:
  workflow_dispatch:
    inputs:
      os:
        description: Runner to probe
        type: choice
        default: windows-latest
        options:
          - windows-latest
          - windows-11-arm
      target:
        description: Bazel target to build
        default: "@@googlesql++googlesql_http_archive_deps+icu//:icu"
      use_msys2:
        description: Point BAZEL_SH at the image's MSYS2 bash (with autotools installed) instead of git-bash
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  probe:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install MSYS2 autotools and point Bazel at its bash
        if: inputs.use_msys2
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed autoconf automake libtool make pkgconf
          Add-Content $env:GITHUB_ENV "BAZEL_SH=C:\msys64\usr\bin\bash.exe"
          # msys2's `bash -c` does not prepend /usr/bin, so repo-rule
          # patch_cmds like `find ...` otherwise resolve to System32's
          # FIND.EXE ("Parameter format not correct"). Note this shadows
          # some Windows binaries (e.g. coreutils link.exe over MSVC's) --
          # Bazel reaches cl/link by absolute path, so far no harm seen.
          Add-Content $env:GITHUB_PATH "C:\msys64\usr\bin"

      # pwsh rather than bash: git-bash's MSYS path conversion mangles
      # //-prefixed labels. The checked-in .bazelrc now has a build:windows
      # section (MSVC flags) and keeps the Clang/GNU flags under build:unix, so
      # the probe reads the rc files normally -- no --ignore_all_rc_files, no
      # inline flag duplication.
      - name: Probe the build
        shell: pwsh
        run: |
          bazel --version
          # --output_base=C:/_b: GoogleSQL's dependency paths overflow
          # MAX_PATH from the default output root (cl.exe D8022 on a
          # .obj.params file); a two-character base saves ~50 characters.
          # This is a startup flag, so it cannot live in a bazelrc config.
          bazel --output_base=C:/_b build -c opt '${{ inputs.target }}'

      - name: Dump foreign_cc state on failure
        if: failure()
        shell: pwsh
        run: |
          $out = bazel --output_base=C:/_b info output_path
          $icu = "$out\x64_windows-opt\bin\external\googlesql++googlesql_http_archive_deps+icu"
          if (-not (Test-Path $icu)) { $icu = "$out\arm64_windows-opt\bin\external\googlesql++googlesql_http_archive_deps+icu" }
          Write-Host "== foreign_cc tree (first 80 entries):"
          Get-ChildItem -Recurse -ErrorAction SilentlyContinue $icu | Select-Object -First 80 -ExpandProperty FullName
          Write-Host "== wrapper log tails:"
          Get-ChildItem -Recurse -Include *.log -ErrorAction SilentlyContinue $icu | ForEach-Object {
            Write-Host "---- $($_.FullName)"
            Get-Content $_.FullName -Tail 120
          }
          Write-Host "== configure's own config.log tail:"
          Get-Content -ErrorAction SilentlyContinue "$icu.build_tmpdir\config.log" -Tail 80
          Write-Host "== assembled source tree (LinkType reveals symlink flavor):"
          Get-ChildItem -ErrorAction SilentlyContinue "$icu.build_tmpdir\icu" | Select-Object Name, LinkType | Format-Table
          Get-ChildItem -ErrorAction SilentlyContinue "$icu.build_tmpdir\icu\source" | Select-Object -First 30 Name, LinkType | Format-Table
          $ext = bazel --output_base=C:/_b info output_base
          Write-Host "== fetched ICU source dir (aux files present?):"
          Get-ChildItem -ErrorAction SilentlyContinue "$ext\external\googlesql++googlesql_http_archive_deps+icu\source" | Select-Object -First 40 -ExpandProperty Name
